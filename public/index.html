<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cờ Vua Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>♟ Cờ Vua Online</h1>

  <div id="lobby">
    <p>Nhập một mã phòng bất kỳ rồi bấm Vào phòng. Sau đó gửi link mời cho bạn của bạn để cùng chơi.</p>
    <input id="room-input" type="text" placeholder="Ví dụ: phong123" />
    <button id="join-btn">Vào phòng</button>
    <p id="lobby-message"></p>

    <div id="invite-box" class="hidden">
      <p>Gửi link này cho bạn của bạn để vào chung phòng:</p>
      <div id="invite-row">
        <input id="invite-link" type="text" readonly />
        <button id="copy-link-btn">Sao chép</button>
      </div>
    </div>
  </div>

  <div id="game" class="hidden">
    <p id="status"></p>
    <div id="board"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="client.js"></script>
</body>
</html>
